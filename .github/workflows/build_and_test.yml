name: build containers and run tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - 'main'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    

jobs:
  Setup_and_build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        container:
          - Alignment
          - Clean
          - Consensus
          - ORF_analysis
          - core_scripts
          - mr_scripts
    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false
          
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - name: Setup Mamba
        uses: mamba-org/setup-micromamba@v2
        with:
          cache-environment: true
          post-cleanup: 'all'
          environment-file: env.yml
          init-shell: bash
      
      - name: Install local python package
        run: |
          pip install . --no-deps
        shell: micromamba-shell {0}

      - name: generate container dockerfiles
        run: |
          python -m container_manager generate
        shell: micromamba-shell {0}

      - name: build container
        run: |
          python -m container_manager build --only ${{ matrix.container }} --manifest ./container_manager/manifests/container-build-manifest-${{ matrix.container }}.json
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: micromamba-shell {0}

      - name: pack container artifact
        run: |
          mkdir -p ./artifacts/${{ matrix.container }}
          cp ./container_manager/manifests/container-build-manifest-${{ matrix.container }}.json ./artifacts/${{ matrix.container }}/
          find ./container_manager -maxdepth 1 -type f -name 'viroconstrictor_${{ matrix.container }}_*.tar' -exec cp {} ./artifacts/${{ matrix.container }}/ \;


      - name: Upload container artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built_container_${{ matrix.container }}
          path: ./artifacts/${{ matrix.container }}/
          overwrite: true
  
  Test:
    runs-on: ubuntu-latest
    needs: Setup_and_build
    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false
          
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - uses: actions/download-artifact@v4
        with:
          pattern: built_container_*
          path: ./artifacts
          merge-multiple: true

      - name: stage container artifacts
        run: |
          cp ./artifacts/*.tar ./container_manager/
          cat ./artifacts/container-build-manifest-*.json > /dev/null
          python -m container_manager merge-manifests

      - name: Setup Apptainer
        uses: eWaterCycle/setup-apptainer@v2

      - name: Setup Mamba
        uses: mamba-org/setup-micromamba@v2
        with:
          cache-environment: true
          post-cleanup: 'all'
          environment-file: env.yml
          init-shell: bash
      
      - name: Install local python package
        run: |
          pip install . --no-deps
        shell: micromamba-shell {0}

      - name: convert containers
        run: |
          python -m container_manager convert --manifest ./container_manager/manifests/container-build-manifest.json
        shell: micromamba-shell {0}

      - name: download existing containers
        run: |
          mkdir -p ./test_containers
          mv ./container_manager/*.sif ./test_containers/ || true
          python -m container_manager sync-cache --cache-dir ./test_containers
        shell: micromamba-shell {0}
      
      ## rest of the testing suite here